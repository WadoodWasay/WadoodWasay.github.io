<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wadood Wasay - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Wadood Wasay</a>
            <ul class="nav-links">
                <li><a href="resume.html">Resume</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="https://github.com/wadoodwasay" target="_blank">GitHub</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                        <span class="theme-icon">☀️</span>
                        <span class="theme-text">Dark</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-background"></div>
        <div class="hero-overlay"></div>
        <div class="hero-pattern"></div>

        <div class="hero-content">
            <img src="assets/images/profile.jpg" alt="Wadood Wasay" class="profile-picture"
                 onerror="this.style.display='none'; document.getElementById('profile-fallback').style.display='flex';">
            <div id="profile-fallback" class="profile-placeholder" style="display: none;">WW</div>

            <h1>Hello, I'm Wadood Wasay</h1>
            <p class="hero-subtitle">I'm a student of computer/electrical engineering, hardware enthusiast, and full-stack engineer. Explore my work below!</p>
        </div>

        <div class="scroll-indicator">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </div>
    </section>

    <!-- Featured Projects Section -->
    <section class="projects-section">
        <div class="container">
            <h2 class="section-title">Featured Projects</h2>

            <div id="featured-projects" class="projects-grid"></div>

            <div class="view-all-container">
                <a href="projects.html" class="view-all-btn">View All Projects →</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Wadood Wasay. All rights reserved.</p>
    </footer>

    <script src="js/featured-projects.js"></script>

    <script>
        // Theme Toggle Functionality
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.querySelector('.theme-icon');
        const themeText = document.querySelector('.theme-text');
        const html = document.documentElement;

        const currentTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', currentTheme);
        updateThemeButton(currentTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        });

        function updateThemeButton(theme) {
            if (theme === 'dark') {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Light';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Dark';
            }
        }
    </script>
</body>
</html>
