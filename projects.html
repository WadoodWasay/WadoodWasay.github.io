<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Wadood Wasay</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Wadood Wasay</a>
            <ul class="nav-links">
                <li><a href="resume.html">Resume</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="https://github.com/WadoodWasay" target="_blank">GitHub</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                        <span class="theme-icon">☀️</span>
                        <span class="theme-text">Dark</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="document-header">
                <h1>Projects</h1>
                <p class="document-subtitle">A collection of my academic and personal work.</p>
            </div>

            <div class="project-filter">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Academic">Academic</button>
                <button class="filter-btn" data-filter="Hobby">Hobby</button>
                <select id="sort-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A–Z</option>
                </select>
            </div>

            <div id="all-projects" class="projects-grid"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Wadood Wasay. All rights reserved.</p>
    </footer>

    <script src="js/projects-page.js"></script>

    <script>
        // Theme Toggle Functionality
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.querySelector('.theme-icon');
        const themeText = document.querySelector('.theme-text');
        const html = document.documentElement;

        const currentTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', currentTheme);
        updateThemeButton(currentTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        });

        function updateThemeButton(theme) {
            if (theme === 'dark') {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Light';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Dark';
            }
        }
    </script>
</body>
</html>
